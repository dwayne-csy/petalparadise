<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Petal Paradise - Home</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body {
      background-color: #f9f7f6;
      font-family: 'Segoe UI', sans-serif;
    }

    .container {
      max-width: 800px;
      margin-top: 80px;
      padding: 40px;
      background-color: white;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
      border-radius: 12px;
    }

    .btn-group {
      margin-top: 30px;
      text-align: center;
    }

    h1 {
      font-weight: bold;
      color: #ff66a3;
      text-align: center;
    }

    .top-bar {
      display: flex;
      justify-content: flex-end;
      padding: 15px;
    }

    .top-bar button {
      margin-left: 10px;
    }

    .card-img-top {
      height: 200px;
      object-fit: cover;
    }

    #productSection {
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <!-- 🔓 Top right: Logout & Edit Profile -->
  <div class="top-bar" id="topBar" style="display: none;">
    <button class="btn btn-outline-primary" onclick="window.location.href='/frontend/Userhandling/update-profile.html'">Edit Profile</button>
    <button class="btn btn-outline-danger" id="logoutBtn">Logout</button>
  </div>

  <div class="container">
    <h1>🌸 Petal Paradise</h1>
    <p class="text-center">Welcome to the official user portal of Petal Paradise.</p>

    <!-- 👥 Guest Buttons -->
    <div class="btn-group" id="authButtons">
      <a href="/frontend/Userhandling/register.html" class="btn btn-primary">Register</a>
      <a href="/frontend/Userhandling/login.html" class="btn btn-success">Login</a>
    </div>

    <!-- 🛍️ Product List Section -->
    <div id="productSection" style="display: none;">
      <h3 class="mb-3 text-start">Available Products</h3>
      <div id="productGrid" class="row row-cols-1 row-cols-md-2 g-4"></div>
    </div>
  </div>

  <script>
    $(document).ready(function () {
      const token = sessionStorage.getItem('token');
      const userId = sessionStorage.getItem('userId');

      if (token && userId) {
        $.ajax({
          method: "GET",
          url: `http://localhost:4000/api/v1/profile/${userId}`,
          headers: { 'Authorization': `Bearer ${token}` },
          success: function (res) {
            if (res.user.role === 'customer') {
              $('#authButtons').hide();
              $('#topBar').show();
              $('#productSection').show();
              loadProducts();
            } else {
              sessionStorage.clear();
              Swal.fire({
                icon: 'error',
                title: 'Access Denied',
                text: 'Admins are not allowed here.',
              }).then(() => window.location.href = "/frontend/Userhandling/login.html");
            }
          },
          error: function () {
            sessionStorage.clear();
            window.location.href = "/frontend/Userhandling/login.html";
          }
        });
      }

      $('#logoutBtn').on('click', function () {
        sessionStorage.clear();
        Swal.fire({
          icon: 'success',
          title: 'Logged out',
          showConfirmButton: false,
          timer: 1000
        }).then(() => window.location.href = "/frontend/Userhandling/login.html");
      });

      function loadProducts() {
        $.ajax({
          method: "GET",
          url: "http://localhost:4000/api/v1/product",
          success: function (res) {
            const grid = $("#productGrid");
            grid.empty();

            if (res.length === 0) {
              grid.append("<p>No products available at the moment.</p>");
              return;
            }

            res.forEach(p => {
              const card = `
                <div class="col">
                  <div class="card h-100 shadow-sm">
                    <img src="http://localhost:4000/uploads/${p.image}" class="card-img-top" alt="${p.name}">
                    <div class="card-body text-start">
                      <h5 class="card-title">${p.name}</h5>
                      <p class="card-text">${p.description}</p>
                      <p class="card-text"><strong>₱${p.sell_price}</strong></p>
                      <p class="card-text">
                        <small class="text-muted">Category: ${p.category}</small><br>
                        <small class="text-muted">Usage: ${p.usage_type}</small><br>
                      </p>
                    </div>
                  </div>
                </div>
              `;
              grid.append(card);
            });
          },
          error: function () {
            $("#productGrid").html("<p>Error loading products.</p>");
          }
        });
      }
    });
  </script>
</body>
</html>
