<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Customer Home</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="/frontend/js/home.js" defer></script>
</head>
<body>
  <h2>Welcome to Petal Paradise</h2>
  <button id="editProfileBtn">Edit Profile</button>
  <button id="logoutBtn">Logout</button>
  <button id="viewCartBtn">My Cart</button>

  <h3>Filter & Sort</h3>
  <div id="filters">
    <input type="text" id="searchInput" placeholder="Search by name">

    <select id="categoryFilter">
      <option value="">All Categories</option>
      <option value="Solo">Solo</option>
      <option value="By Three">By Three</option>
      <option value="Bouquet">Bouquet</option>
    </select>

    <select id="usageTypeFilter">
      <option value="">All Usage</option>
      <option value="Decoration">Decoration</option>
      <option value="Gift">Gift</option>
      <option value="Event">Event</option>
    </select>

    <select id="priceSort">
      <option value="">Sort by price</option>
      <option value="asc">Price: Low to High</option>
      <option value="desc">Price: High to Low</option>
    </select>

    <select id="stockSort">
      <option value="">Sort by stock</option>
      <option value="high">High to Low</option>
      <option value="low">Low to High</option>
    </select>

    <button id="applyFiltersBtn">Apply Filters</button>
  </div>

  <h2>Products</h2>
  <table border="1" id="productTable">
    <thead>
      <tr>
        <th>#</th>
        <th>Name</th>
        <th>Category</th>
        <th>Usage</th>
        <th>Price</th>
        <th>Stock</th>
        <th>Image</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</body>
</html>
