<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        #checkoutTable {
            width: 100%;
            border-collapse: collapse;
        }
        #checkoutTable th, #checkoutTable td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        #userAddress {
            background: #f5f5f5;
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        button {
            padding: 10px 15px;
            margin-right: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h2>Order Confirmation</h2>
    
    <div>
        <h4>Shipping Address:</h4>
        <p id="userAddress">Loading address...</p>
    </div>

    <table id="checkoutTable">
        <thead>
            <tr>
                <th>#</th>
                <th>Product</th>
                <th>Qty</th>
                <th>Price</th>
                <th>Image</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <h3>Total: <span id="totalAmount">$0.00</span></h3>

    <button id="confirmCheckoutBtn">Confirm Order</button>
    <button id="cancelCheckoutBtn">Cancel</button>

    <script src="/frontend/js/checkout.js"></script>
</body>
</html>
