<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Cart</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="/frontend/js/cart.js" defer></script>
  <style>
    table { border-collapse: collapse; width: 80%; margin: 20px auto; }
    th, td { padding: 8px 12px; border: 1px solid #ccc; text-align: center; }
    button { margin: 0 2px; }
    h2 { text-align: center; }
  </style>
</head>
<body>
  <h2>🛒 My Cart</h2>
<table border="1" id="cartTable">
    <thead>
        <tr>
            <th>#</th>
            <th>Product Name</th>
            <th>Image</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody>
        <!-- cart items will be loaded here -->
    </tbody>
</table>

<!-- Total price row -->
<div style="margin-top: 15px; text-align: right; font-weight: bold; font-size: 1.2em;">
    Total: <span id="cartTotal">$0.00</span>
</div>
    <button id="checkoutBtn">Proceed to Checkout</button>
<button id="backToHomeBtn">Back to Home</button>
  </div>
</body>
</html>
