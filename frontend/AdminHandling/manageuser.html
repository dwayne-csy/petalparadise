<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>User Role & Status Management</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to right, #fce4ec, #f8bbd0);
      padding: 20px;
      overflow-x: hidden;
    }

    h2 {
      text-align: center;
      color: #ad1457;
      margin-bottom: 20px;
    }

    #backBtn {
      background-color: #ec407a;
      color: white;
      padding: 8px 15px;
      border-radius: 20px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      margin-bottom: 20px;
      transition: background 0.3s;
    }

    #backBtn:hover {
      background-color: #d81b60;
    }

    #userForm {
      max-width: 600px;
      margin: 0 auto 30px;
      background-color: #fff;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      display: grid;
      gap: 15px;
    }

    #userForm select {
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    #submitBtn {
      background-color: #ec407a;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 20px;
      font-weight: bold;
      cursor: pointer;
    }

    #submitBtn:hover {
      background-color: #d81b60;
    }

    #userTable {
      width: 100%;
      border-collapse: collapse;
      background-color: #fff;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }

    #userTable th, #userTable td {
      padding: 12px;
      text-align: center;
      border-bottom: 1px solid #eee;
    }

    #userTable th {
      background-color: #f8bbd0;
      color: #6a1b9a;
    }

    #userTable td:last-child button {
      margin: 0 5px;
      background-color: #f48fb1;
      border: none;
      color: white;
      padding: 5px 10px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
    }

    #userTable td:last-child button:hover {
      background-color: #ec407a;
    }

    .petal {
      position: fixed;
      top: -50px;
      width: 25px;
      height: 25px;
      background-image: url('https://cdn-icons-png.flaticon.com/512/742/742751.png');
      background-size: cover;
      animation: fall linear infinite;
      z-index: 0;
      opacity: 0.8;
      pointer-events: none;
    }

    @keyframes fall {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <!-- 🌸 Petals Falling -->
  <script>
    for (let i = 0; i < 15; i++) {
      const petal = document.createElement('div');
      petal.className = 'petal';
      petal.style.left = Math.random() * 100 + 'vw';
      petal.style.animationDuration = (5 + Math.random() * 5) + 's';
      petal.style.animationDelay = (Math.random() * 5) + 's';
      document.body.appendChild(petal);
    }
  </script>

  <!-- 🔙 Back Button -->
  <div style="text-align: left;">
    <button id="backBtn">« Back to Dashboard</button>
  </div>

  <h2>Manage User Role & Status</h2>

  <form id="userForm">
    <input type="hidden" id="userId">
    <!-- ✅ Display name of the user being edited -->
    <span id="editingUserName" style="text-align:center; display:block; font-weight:600; color:#6a1b9a; margin-top:-10px; margin-bottom:10px; font-size: 18px;"></span>

    <select id="role" required>
      <option value="" disabled selected>Select Role</option>
      <option value="admin">Admin</option>
      <option value="customer">Customer</option>
    </select>

    <select id="status" required>
      <option value="" disabled selected>Select Status</option>
      <option value="active">Active</option>
      <option value="inactive">Inactive</option>
    </select>

    <button type="submit" id="submitBtn">Update</button>
  </form>

  <br>

  <table id="userTable">
    <thead>
      <tr>
        <th>#</th>
        <th>Name</th>
        <th>Email</th>
        <th>Contact</th>
        <th>Address</th>
        <th>Role</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <!-- ✅ Auth Check and Back Navigation -->
  <script>
    $(document).ready(function () {
      const token = sessionStorage.getItem('token');
      const userId = sessionStorage.getItem('userId');
      const role = sessionStorage.getItem('role');

      if (!token || !userId || role !== 'admin') {
        sessionStorage.clear();
        return window.location.href = "/frontend/Userhandling/login.html";
      }

      $("#backBtn").click(() => {
        window.location.href = "/frontend/Adminhandling/admindashboard.html";
      });
    });
  </script>

  <!-- ✅ External JS -->
  <script src="/frontend/js/manageuser.js" defer></script>
</body>
</html>
